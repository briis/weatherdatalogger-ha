name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # HACS validation also flags integrations that no longer meet current
    # HACS store requirements even without a local change.
    - cron: "17 4 * * 1"

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: home-assistant/actions/hassfest@master

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hacs/action@main
        with:
          category: integration
