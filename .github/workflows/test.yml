name: Test

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Catch breakage from a new Home Assistant release even without a code
    # change here — requirements_test.txt pins homeassistant==, so this
    # mainly guards the window between a Dependabot PR opening and merging.
    - cron: "17 4 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements_test.txt

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements_test.txt -r requirements.txt

      - name: Lint (ruff)
        run: ruff check custom_components tests

      - name: Run tests
        run: pytest tests/ -v --cov=custom_components.weatherdatalogger
