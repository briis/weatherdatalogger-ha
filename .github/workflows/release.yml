name: "Release"

on:
  release:
    types:
      - "published"
  workflow_dispatch:

permissions: {}

jobs:
  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v7.0.0"

      - name: "Adjust version number"
        shell: "bash"
        run: |
          yq -i -o json '.version="${{ github.event.release.tag_name }}"' \
            "${{ github.workspace }}/custom_components/weatherdatalogger/manifest.json"


      - name: "ZIP the integration directory"
        shell: "bash"
        run: |
          cd "${{ github.workspace }}/custom_components/weatherdatalogger"
          zip visualcrossing.zip -r ./

      - name: "Upload the ZIP file to the release"
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ github.workspace }}/custom_components/weatherdatalogger/weatherdatalogger_ha.zip